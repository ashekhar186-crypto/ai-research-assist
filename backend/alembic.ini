# alembic.ini
# ─────────────────────────────────────────────────────────────────────────────
# Alembic configuration file for database schema migrations.
#
# HOW TO USE:
#   1. Initialize (first time only):
#      cd backend && alembic init app/database/migrations
#
#   2. Create a new migration after changing models:
#      alembic revision --autogenerate -m "add users table"
#
#   3. Apply migrations to the database:
#      alembic upgrade head
#
#   4. Rollback one migration:
#      alembic downgrade -1
# ─────────────────────────────────────────────────────────────────────────────

[alembic]
script_location = app/database/migrations
sqlalchemy.url = postgresql://postgres:password@localhost:5432/research_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S